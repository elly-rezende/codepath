<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background with brand gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="60%" stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#10D9C4"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>
  <rect width="512" height="512" rx="110" fill="url(#glow)"/>

  <!-- Bit mascot — centered, scaled up -->
  <g transform="translate(76, 76) scale(3.6)">
    <!-- Antenna -->
    <line x1="50" y1="15" x2="50" y2="5" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="50" cy="3" r="3.5" fill="#FFFFFF"/>

    <!-- Left arm -->
    <rect x="12" y="50" width="8" height="20" rx="4" fill="#FFFFFF"/>
    <circle cx="16" cy="72" r="5" fill="#FFFFFF" opacity="0.85"/>

    <!-- Right arm -->
    <rect x="80" y="50" width="8" height="20" rx="4" fill="#FFFFFF"/>
    <circle cx="84" cy="72" r="5" fill="#FFFFFF" opacity="0.85"/>

    <!-- Body / Head -->
    <rect x="20" y="20" width="60" height="60" rx="14" fill="#FFFFFF"/>

    <!-- Screen face (dark) -->
    <rect x="28" y="32" width="44" height="32" rx="6" fill="#1A1B2E"/>

    <!-- Eyes (white) -->
    <circle cx="40" cy="46" r="5.5" fill="#FFFFFF"/>
    <circle cx="60" cy="46" r="5.5" fill="#FFFFFF"/>
    <!-- Pupils -->
    <circle cx="40" cy="47" r="1.8" fill="#1A1B2E"/>
    <circle cx="60" cy="47" r="1.8" fill="#1A1B2E"/>

    <!-- Happy smile -->
    <path d="M 42 56 Q 50 62 58 56" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Cheek glows -->
    <circle cx="32" cy="54" r="3.5" fill="#FF6B9D" opacity="0.6"/>
    <circle cx="68" cy="54" r="3.5" fill="#FF6B9D" opacity="0.6"/>

    <!-- Legs -->
    <rect x="35" y="82" width="8" height="14" rx="3" fill="#FFFFFF"/>
    <rect x="57" y="82" width="8" height="14" rx="3" fill="#FFFFFF"/>
    <ellipse cx="39" cy="98" rx="7" ry="3" fill="#FFFFFF" opacity="0.85"/>
    <ellipse cx="61" cy="98" rx="7" ry="3" fill="#FFFFFF" opacity="0.85"/>
  </g>
</svg>
