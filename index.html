<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- App identity -->
    <title>CodePath — Aprenda a Programar</title>
    <meta name="description" content="App de programação para crianças e adolescentes. Aprenda Big O, recursão, sistemas — com exemplos de TikTok, Discord, Minecraft e Roblox." />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#3B82F6" />
    <meta name="background-color" content="#12141C" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <link rel="mask-icon" href="/icon-192.svg" color="#3B82F6" />

    <!-- iOS Safari PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CodePath" />

    <!-- Android Chrome PWA support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="CodePath" />

    <!-- Open Graph / social cards -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CodePath — Aprenda a Programar" />
    <meta property="og:description" content="App para crianças e adolescentes aprenderem programação com jogos do dia a dia." />
    <meta property="og:image" content="/icon-512.svg" />
    <meta property="og:locale" content="pt_BR" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts (cached by service worker) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
